<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ai là triệu phú - Điện thế</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#001a33,#003366);
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#001f4d;
}

/* LAYOUT */
.main{
display:flex;
height:calc(100vh - 60px);
}

/* QUESTION */
.question-area{
flex:1;
padding:20px;
}

/* SCOREBOARD */
.scoreboard{
width:80px;
background:#001633;
overflow:auto;
}

.score-item{
text-align:center;
padding:5px;
font-size:12px;
}

.current{
background:#ffcc00;
color:black;
font-weight:bold;
}

/* ANSWERS */
.answer{
background:#123;
margin:5px;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.answer:hover{background:#234}

.correct{background:#28a745}
.wrong{background:#dc3545}

/* RESULT */
.result{padding:20px}
</style>
</head>

<body>

<div id="start" style="text-align:center;margin-top:50px">
<h2>AI LÀ TRIỆU PHÚ - ĐIỆN THẾ</h2>
<input id="name" placeholder="Họ tên"><br><br>
<button onclick="startGame()">Vào ghế nóng</button>
</div>

<div id="game" style="display:none">

<div class="header">
<div id="info"></div>
<div id="timer"></div>
</div>

<div class="main">

<div class="question-area">
<h3 id="question"></h3>
<div id="answers"></div>
</div>

<div class="scoreboard" id="scoreboard"></div>

</div>

</div>

<div id="result" style="display:none"></div>

<script>

/* ================= NGÂN HÀNG CÂU HỎI ================= */
/* LẤY NGUYÊN VĂN từ file */

const bank = [
{
type:"mcq",
q:"Điện thế tại một điểm trong điện trường là đại lượng đặc trưng cho điện trường về",
a:[
"phương diện tác dụng lực",
"khả năng sinh công của điện trường",
"phương diện dự trữ năng lượng",
"mức độ mạnh yếu của điện trường"
],
correct:1,
explain:"Điện thế đặc trưng cho khả năng sinh công của điện trường."
},
{
type:"mcq",
q:"Trong hệ SI, đơn vị của điện thế là",
a:["joule (J)","volt (V)","ampere (A)","coulomb (C)"],
correct:1,
explain:"Đơn vị điện thế là volt (V)."
},
{
type:"mcq",
q:"Trong điện trường, nếu đi dọc theo chiều của đường sức điện thì điện thế sẽ",
a:["tăng dần","giảm dần","không thay đổi","bằng không"],
correct:1,
explain:"Điện thế giảm theo chiều đường sức."
},
{
type:"tf",
q:"Xét điện trường đều giữa hai bản song song",
a:[
"Điện thế đặc trưng cho khả năng sinh công",
"Các điểm trên cùng đường sức có cùng điện thế",
"Chọn mốc khác làm thay đổi điện thế",
"Điện thế tăng theo chiều đường sức"
],
correct:["Đ","S","Đ","S"],
explain:"Điện thế không đổi theo mặt đẳng thế, giảm theo chiều đường sức."
},
{
type:"short",
q:"Một điện tích có thế năng 3000 J với q=1 C. Điện thế là bao nhiêu V?",
correct:"3000",
explain:"V = W/q = 3000/1 = 3000 V"
}
];

/* ================= VAR ================= */

let questions = bank.sort(()=>Math.random()-0.5).slice(0,5);
let current=0,score=0,time=30,history=[],timer;

/* ================= START ================= */

function startGame(){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("info").innerText =
"Thí sinh: "+document.getElementById("name").value;

showQuestion();
}

/* ================= SCOREBOARD ================= */

function renderScore(){
let html="";
for(let i=20;i>=1;i--){
html+=`<div class="score-item ${i===current+1?"current":""}">${i}</div>`;
}
document.getElementById("scoreboard").innerHTML=html;
}

/* ================= QUESTION ================= */

function showQuestion(){
renderScore();

let q=questions[current];
document.getElementById("question").innerText="Câu "+(current+1)+": "+q.q;

let html="";

if(q.type==="mcq"){
q.a.forEach((ans,i)=>{
html+=`<div class="answer" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${ans}</div>`;
});
}

if(q.type==="tf"){
q.a.forEach((ans,i)=>{
html+=`${ans} 
<button onclick="answerTF(${i},'Đ')">Đ</button>
<button onclick="answerTF(${i},'S')">S</button><br>`;
});
}

if(q.type==="short"){
html+=`<input id="inputAns"><button onclick="answerShort()">OK</button>`;
}

document.getElementById("answers").innerHTML=html;

startTimer();
}

/* ================= TIMER ================= */

function startTimer(){
time=30;
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳ "+time;
if(time<=0){endGame()}
},1000);
}

/* ================= ANSWER ================= */

function answer(i){
clearInterval(timer);
let q=questions[current];

history.push({q,selected:i});

if(i===q.correct){score++}
else{endGame();return}

next();
}

function answerTF(i,val){
let q=questions[current];
if(!history[current]) history[current]={q,selected:[]};
history[current].selected[i]=val;

if(history[current].selected.length===4){
next();
}
}

function answerShort(){
let val=document.getElementById("inputAns").value;
let q=questions[current];

history.push({q,selected:val});

if(val===q.correct) score++;
else{endGame();return}

next();
}

function next(){
current++;
if(current>=questions.length) endGame();
else showQuestion();
}

/* ================= RESULT ================= */

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";

let html="<div class='result'>";
html+="<h2>Điểm: "+score+"</h2>";

history.forEach((item,i)=>{
html+=`<div><b>Câu ${i+1}: ${item.q.q}</b>`;

if(item.q.type==="mcq"){
item.q.a.forEach((ans,index)=>{
let cls="";
if(index===item.q.correct) cls="correct";
if(index===item.selected && index!==item.q.correct) cls="wrong";
html+=`<div class="${cls}">${String.fromCharCode(65+index)}. ${ans}</div>`;
});
}

html+=`<i>Giải thích: ${item.q.explain}</i></div><hr>`;
});

html+="</div>";

document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
