<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ai là triệu phú - Điện thế</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
body{font-family:Arial;margin:0;background:#0b1c3f;color:white}
.container{padding:10px}
.header{display:flex;justify-content:space-between}
.scoreboard{position:absolute;right:0;top:60px;width:120px}
.question{margin-top:20px;font-size:20px}
.answers button{display:block;width:100%;margin:5px;padding:10px;font-size:16px}
.correct{background:green}
.wrong{background:red}
</style>
</head>

<body>

<div id="start">
<h2>AI LÀ TRIỆU PHÚ - ĐIỆN THẾ</h2>
<input id="name" placeholder="Họ tên"><br>
<input id="sbd" placeholder="SBD"><br>
<button onclick="startGame()">Vào ghế nóng</button>
</div>

<div id="game" style="display:none">
<div class="header">
<div id="info"></div>
<div id="timer"></div>
</div>

<div class="question" id="question"></div>
<div class="answers" id="answers"></div>
</div>

<script>
let questions = [
{q:"Điện thế tại một điểm đặc trưng cho?",a:["Tác dụng lực","Khả năng sinh công","Dự trữ năng lượng","Mức độ mạnh"],correct:1},
{q:"Đơn vị điện thế?",a:["J","V","A","C"],correct:1},
{q:"Hiệu điện thế là?",a:["Lực","Khả năng sinh công giữa 2 điểm","Điện tích","Dòng điện"],correct:1},
{q:"Trong điện trường đều U = ?",a:["Ed","E/d","d/E","E+d"],correct:0},
{q:"Điện thế phụ thuộc?",a:["Không phụ thuộc","Luôn dương","Phụ thuộc mốc","Luôn âm"],correct:2},
{q:"Hiệu điện thế 12V nghĩa là?",a:["1C sinh công 12J","Điện tích 12C","Electron 12J","E=12"],correct:0},
{q:"Dòng điện chạy từ?",a:["Thấp→cao","Cao→thấp","0→dương","Âm→dương"],correct:1},
{q:"Thế năng W = ?",a:["q/V","qV","V/q","q+V"],correct:1},
{q:"Đi dọc đường sức, điện thế?",a:["Tăng","Giảm","Không đổi","0"],correct:1},
{q:"Mốc điện thế thường chọn?",a:["Cực dương","Mặt đất","Bất kỳ","Max"],correct:1}
];

let current = 0;
let score = 0;
let time = 30;
let timer;

function startGame(){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
showQuestion();
}

function showQuestion(){
let q = questions[current];
document.getElementById("question").innerText = q.q;
let ansDiv = document.getElementById("answers");
ansDiv.innerHTML="";
q.a.forEach((ans,i)=>{
let btn=document.createElement("button");
btn.innerText=ans;
btn.onclick=()=>checkAnswer(i);
ansDiv.appendChild(btn);
});
startTimer();
}

function checkAnswer(i){
clearInterval(timer);
let correct = questions[current].correct;
if(i===correct){
score++;
alert("Đúng!");
}else{
alert("Sai! Kết thúc.");
endGame();
return;
}
current++;
if(current>=questions.length){
endGame();
}else{
showQuestion();
}
}

function startTimer(){
time=30;
document.getElementById("timer").innerText="Time: "+time;
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
if(time<=0){
clearInterval(timer);
alert("Hết giờ!");
endGame();
}
},1000);
}

function endGame(){
alert("Điểm: "+score);
location.reload();
}
</script>

</body>
</html>
